ai_usage_summary: |
  Used OpenAI Codex to fill the submission metadata from repository context
  and local environment checks. The ranker itself is deterministic, CPU-only,
  uses the Python standard library, and makes no network calls during ranking.

methodology_summary: |
  Deterministic rule-based ranker for the Senior AI Engineer JD. The scoring
  model emphasizes production evidence in titles and career history for
  retrieval, ranking, search, recommendations, embeddings, vector search, and
  evaluation systems. Skills are supporting evidence weighted by proficiency,
  endorsements, duration, and Redrob assessment scores. The final score combines
  career fit, target skills, 5-9 year experience fit, product-company exposure,
  education, behavioral availability, location, and salary reasonableness. It
  applies penalties and hard caps for keyword stuffing, inconsistent experience,
  expert skills with zero duration, non-technical titles with many AI keywords,
  low availability signals, and honeypot-style fabrication.

declarations:
  read_submission_spec: true
